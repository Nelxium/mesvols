name: MesVols - Mise a jour automatique

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"  # Toutes les 30 min

concurrency:
  group: mesvols-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Run scraping pipeline
        run: python main_ci.py

      - name: Publish to docs/
        run: python publish.py

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.js docs/ci_health.json
          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi
          git commit -m "update data"
          # Retry loop : rebase + push, max 3 tentatives
          for i in 1 2 3; do
            echo "Push attempt $i..."
            git pull --rebase origin main && git push && exit 0
            echo "Push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: push failed after 3 attempts"
          exit 1
