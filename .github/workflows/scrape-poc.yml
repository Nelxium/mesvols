name: POC Scraping Google Flights

on:
  workflow_dispatch:

jobs:
  scrape-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Verify Chrome
        run: |
          google-chrome --version
          which google-chrome

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Run POC scraping test
        run: python scrape_poc.py
