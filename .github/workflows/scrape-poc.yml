name: MesVols - Mise a jour automatique

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"  # Toutes les 30 min

concurrency:
  group: mesvols-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install selenium webdriver-manager

      - name: Run scraping pipeline
        run: python main_ci.py

      - name: Publish to docs/
        run: python publish.py

      - name: Commit and push if changed
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.js docs/ci_health.json
          if git diff --cached --quiet; then
            echo "No changes to push"
            exit 0
          fi
          git commit -m "update data"

          # Restore les artefacts generes non-publics pour que le worktree
          # soit propre avant rebase (main_ci.py modifie data.js racine
          # et prix_vols.csv, mais seul docs/ est publie).
          echo "Cleaning generated files from worktree..."
          git checkout -- data.js prix_vols.csv 2>/dev/null || true
          echo "Worktree status:"
          git status --short

          for i in 1 2 3; do
            echo "--- Attempt $i/3 ---"
            git rebase --abort 2>/dev/null || true

            # Pull + rebase
            pull_ok=true
            git pull --rebase origin main 2>&1 || pull_ok=false

            if [ "$pull_ok" = false ]; then
              # Distinguer conflit de rebase vs erreur transitoire
              if git status | grep -q "rebase in progress"; then
                echo "ERROR: rebase conflict (not retryable)"
                git rebase --abort 2>/dev/null || true
                exit 1
              fi
              echo "Pull/rebase failed (transient?), retrying in 5s..."
              sleep 5
              continue
            fi

            # Push
            if git push; then
              echo "Push OK"
              exit 0
            fi
            echo "Push rejected, retrying in 5s..."
            sleep 5
          done
          echo "ERROR: push failed after 3 attempts"
          exit 1
